<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#0d1117"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Семейный планер</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

/* ═══ THEME VARIABLES ═══════════════════════════════════════════════════════ */
:root {
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --shadow: 0 1px 3px #0003, 0 4px 12px #0002;
  --shadow-lg: 0 8px 32px #0005;
  --transition: .18s ease;
  --sidebar-w: 240px;
  --accent: #6366f1;
  --accent2: #818cf8;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #f59e0b;
  --purple: #a855f7;
  --cyan: #06b6d4;
  --orange: #f97316;
}
[data-theme="dark"] {
  --bg:       #0f1117;
  --bg-card:  #1a1d27;
  --bg-hover: #21263a;
  --bg-input: #12151f;
  --border:   #2a2f45;
  --border2:  #363d58;
  --text:     #e8eaf6;
  --text2:    #8b92b8;
  --text3:    #4a5180;
  --sidebar-bg: #12151f;
  --header-bg: #12151f;
  --nav-active: #1e2340;
}
[data-theme="light"] {
  --bg:       #f0f2fa;
  --bg-card:  #ffffff;
  --bg-hover: #f4f6ff;
  --bg-input: #f8f9ff;
  --border:   #e2e5f0;
  --border2:  #c8cde8;
  --text:     #1a1d2e;
  --text2:    #5a6080;
  --text3:    #a0a8c8;
  --sidebar-bg: #ffffff;
  --header-bg: #ffffff;
  --nav-active: #eef0ff;
}

/* ═══ RESET ══════════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; transition: background var(--transition), color var(--transition); }
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; }
a { color: var(--accent2); }

/* ═══ LAYOUT ════════════════════════════════════════════════════════════════ */
.app-shell { display: flex; height: 100vh; overflow: hidden; }

/* ── Sidebar (desktop) ── */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  scrollbar-width: none;
  transition: background var(--transition);
}
.sidebar::-webkit-scrollbar { display: none; }

.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo-icon { font-size: 26px; }
.sidebar-logo-text { font-size: 15px; font-weight: 800; color: var(--text); letter-spacing: -.3px; }

.sidebar-section { padding: 10px 10px 0; }
.sidebar-section-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; padding: 0 8px 6px; }
.sidebar-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: var(--radius-md);
  font-size: 13.5px; font-weight: 600; color: var(--text2);
  cursor: pointer; transition: all var(--transition);
  border: none; background: none; width: 100%; text-align: left;
  position: relative; margin-bottom: 2px;
}
.sidebar-nav-item:hover { background: var(--bg-hover); color: var(--text); }
.sidebar-nav-item.active { background: var(--nav-active); color: var(--accent2); }
.sidebar-nav-item.active .nav-icon { filter: none; }
.nav-icon { font-size: 18px; flex-shrink: 0; }
.nav-badge {
  margin-left: auto;
  background: var(--red); color: #fff;
  font-size: 10px; font-weight: 800;
  padding: 1px 6px; border-radius: 10px;
}

.sidebar-footer {
  margin-top: auto;
  padding: 12px 10px;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 6px;
}
.theme-toggle {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: var(--radius-md);
  font-size: 13px; font-weight: 600; color: var(--text2);
  background: none; border: 1px solid var(--border); width: 100%;
  transition: all var(--transition);
}
.theme-toggle:hover { border-color: var(--accent); color: var(--text); }
.user-block {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: var(--radius-md);
  background: var(--bg-hover); border: 1px solid var(--border);
  font-size: 13px; font-weight: 600; color: var(--text2);
}
.user-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--purple)); display: flex; align-items: center; justify-content: center; font-size: 13px; color: #fff; flex-shrink: 0; }

/* ── Main content ── */
.main-area { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }
.top-header {
  background: var(--header-bg);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.page-title { font-size: 17px; font-weight: 800; color: var(--text); }
.header-right { display: flex; align-items: center; gap: 10px; }
.date-chip { font-size: 12px; color: var(--text2); background: var(--bg-hover); border: 1px solid var(--border); padding: 4px 11px; border-radius: 20px; }

/* scroll area fills the panel — never grows wider than its parent */
.content-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px 24px 40px;
  width: 100%;
}
.content-scroll::-webkit-scrollbar { width: 5px; }
.content-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* inner wrapper: caps readable width, centered, never causes reflow */
.content-inner {
  width: 100%;
  max-width: 1100px;
  margin: 0 auto;
}

/* ── Bottom nav (mobile) ── */
.bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--sidebar-bg);
  border-top: 1px solid var(--border);
  padding: 6px 4px env(safe-area-inset-bottom);
  z-index: 100;
  overflow-x: auto;
  scrollbar-width: none;
}
.bottom-nav::-webkit-scrollbar { display: none; }
.bottom-nav-inner { display: flex; gap: 2px; min-width: max-content; padding: 0 4px; }
.bnav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 5px 10px; border-radius: var(--radius-md);
  font-size: 10px; font-weight: 700; color: var(--text3);
  background: none; border: none; position: relative;
  transition: all var(--transition); min-width: 52px;
}
.bnav-btn.active { color: var(--accent2); background: var(--nav-active); }
.bnav-icon { font-size: 20px; }
.bnav-badge { position: absolute; top: 3px; right: 6px; background: var(--red); color: #fff; font-size: 9px; font-weight: 800; padding: 1px 4px; border-radius: 10px; }

/* ── Mobile header ── */
.mobile-header {
  display: none;
  background: var(--header-bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.mobile-logo { display: flex; align-items: center; gap: 8px; font-size: 20px; }
.mobile-logo-text { font-size: 14px; font-weight: 800; color: var(--text); }

/* ═══ COMPONENTS ════════════════════════════════════════════════════════════ */
.section { display: flex; flex-direction: column; gap: 14px; width: 100%; min-width: 0; }

/* cards */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  box-shadow: var(--shadow);
  width: 100%;
  min-width: 0;
}
.card-title { font-size: 13px; font-weight: 700; color: var(--text2); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .05em; }
/* summary row */
.summary-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; width: 100%; }
.summary-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 14px 12px;
  text-align: center; box-shadow: var(--shadow);
}
.summary-card .s-icon { font-size: 22px; margin-bottom: 6px; }
.summary-card .s-val { font-size: 18px; font-weight: 800; }
.summary-card .s-lbl { font-size: 11px; color: var(--text2); margin-top: 2px; font-weight: 500; }

/* form grid */
.fgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; min-width: 0; }
.fc3 { grid-template-columns: 1fr 1fr 1fr; }
.fcol2 { grid-column: 1/-1; }

/* inputs */
.inp {
  background: var(--bg-input); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 9px 12px;
  color: var(--text); font-size: 14px; outline: none; width: 100%;
  transition: border-color var(--transition);
}
.inp:focus { border-color: var(--accent); }
.inp::placeholder { color: var(--text3); }
.sel {
  background: var(--bg-input); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 9px 12px;
  color: var(--text); font-size: 14px; outline: none; width: 100%;
  transition: border-color var(--transition);
}
.sel option { background: var(--bg-card); }
.sel:focus { border-color: var(--accent); }

/* buttons */
.btn {
  background: linear-gradient(135deg, var(--accent), var(--purple));
  border: none; border-radius: var(--radius-sm); padding: 10px 16px;
  color: #fff; font-size: 14px; font-weight: 700; width: 100%;
  transition: opacity var(--transition), transform var(--transition);
  box-shadow: 0 2px 8px #6366f133;
}
.btn:hover { opacity: .9; }
.btn:active { transform: scale(.98); }
.btn-ghost {
  background: var(--bg-hover); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 7px 13px;
  color: var(--text2); font-size: 13px; font-weight: 600;
  transition: all var(--transition);
}
.btn-ghost:hover { border-color: var(--accent); color: var(--accent2); }
.btn-xs {
  background: var(--bg-hover); border: 1px solid var(--border);
  border-radius: 6px; padding: 3px 9px;
  color: var(--text2); font-size: 11px; font-weight: 600;
  transition: all var(--transition); white-space: nowrap;
}
.btn-xs:hover { border-color: var(--accent); color: var(--accent2); }
.btn-danger { border-color: #ef444433; color: var(--red); }
.btn-danger:hover { background: #ef444411; }
.del-btn { background: none; border: none; color: var(--text3); font-size: 14px; padding: 3px 5px; transition: color var(--transition); }
.del-btn:hover { color: var(--red); }

/* chips */
.chips { display: flex; flex-wrap: wrap; gap: 6px; width: 100%; }
.chip {
  background: var(--bg-hover); border: 1.5px solid var(--border);
  border-radius: 20px; padding: 4px 12px;
  color: var(--text2); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all var(--transition); white-space: nowrap;
}
.chip:hover { border-color: var(--accent); color: var(--accent2); }
.chip.on { background: #6366f122; border-color: var(--accent); color: var(--accent2); }

/* labels / checkboxes */
.chk-label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); cursor: pointer; padding: 2px 0; }
.chk-label input { accent-color: var(--accent); width: 15px; height: 15px; }
.chkbox { width: 16px; height: 16px; accent-color: var(--green); cursor: pointer; flex-shrink: 0; }

/* list items */
.item {
  background: var(--bg-card); border: 1.5px solid var(--border);
  border-radius: var(--radius-md); padding: 10px 12px;
  display: flex; align-items: flex-start; gap: 10px;
  transition: border-color var(--transition), box-shadow var(--transition);
  box-shadow: var(--shadow);
}
.item:hover { border-color: var(--border2); box-shadow: var(--shadow-lg); }
.item.done { opacity: .45; }
.item.dragging { opacity: .3; border-style: dashed; }
.item-body { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.item-name { font-size: 14px; font-weight: 600; color: var(--text); word-break: break-word; }
.item-meta { font-size: 12px; color: var(--text2); }
.item-end { display: flex; align-items: center; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.drag-handle { color: var(--text3); font-size: 15px; cursor: grab; user-select: none; flex-shrink: 0; padding-top: 1px; }
.drag-handle:active { cursor: grabbing; }

/* tags / pills */
.tag { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 6px; }
.tag-today { background: #f59e0b22; color: var(--yellow); border: 1px solid #f59e0b33; }
.tag-date  { background: var(--bg-hover); color: var(--text2); border: 1px solid var(--border); }

/* progress */
.prog-wrap { display: flex; flex-direction: column; gap: 4px; }
.prog-bar { background: var(--bg-input); border-radius: 20px; height: 6px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 20px; transition: width .4s; background: linear-gradient(90deg, var(--green), #16a34a); }
.prog-lbl { font-size: 11px; color: var(--text2); text-align: right; }

/* section heading */
.s-heading { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.s-title { font-size: 20px; font-weight: 800; color: var(--text); }
.s-sub { font-size: 13px; font-weight: 700; color: var(--accent2); margin-top: 4px; }

/* group header */
.group-hdr { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; padding: 4px 0 2px; color: var(--text3); }

/* filter box */
.filter-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px; width: 100%; min-width: 0; }
.filter-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }

/* stat row */
.stat-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; width: 100%; }
.stat-card { background: var(--bg-card); border: 1.5px solid var(--border); border-radius: var(--radius-lg); padding: 12px; text-align: center; box-shadow: var(--shadow); }
.stat-val { font-size: 24px; font-weight: 800; }
.stat-lbl { font-size: 11px; color: var(--text2); margin-top: 2px; font-weight: 500; }

/* budget row */
.budget-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.budget-lbl { font-size: 13px; color: var(--text2); font-weight: 500; flex: 1; }

/* calendar */
.cal-nav { display: flex; align-items: center; justify-content: space-between; }
.cal-nav-btn { background: var(--bg-hover); border: 1px solid var(--border); color: var(--text2); border-radius: var(--radius-sm); padding: 5px 15px; font-size: 18px; transition: all var(--transition); }
.cal-nav-btn:hover { border-color: var(--accent); color: var(--accent2); }
.cal-month { font-size: 16px; font-weight: 800; color: var(--text); }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
.cal-dh { text-align: center; font-size: 10px; font-weight: 700; color: var(--text3); padding: 4px 0; }
.cal-day { background: var(--bg-card); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 5px; min-height: 46px; display: flex; flex-direction: column; gap: 2px; cursor: pointer; transition: all var(--transition); }
.cal-day:hover { border-color: var(--border2); }
.cal-day.is-today { border-color: var(--accent); background: #6366f111; }
.cal-day.is-sel { border-color: var(--yellow); background: #f59e0b11; }
.cal-dn { font-size: 11px; font-weight: 700; color: var(--text); }
.cal-dots { display: flex; flex-wrap: wrap; gap: 2px; }
.cal-dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
.sel-day-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
.color-row { display: flex; gap: 7px; align-items: center; }
.clr-dot { display: inline-block; width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2.5px solid transparent; transition: border-color var(--transition); }
input[type=radio]:checked + .clr-dot { border-color: var(--text); }

/* two-column media */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: start; width: 100%; min-width: 0; }
.col-blk { background: var(--bg-card); border: 1.5px solid var(--border); border-radius: var(--radius-lg); padding: 12px; min-height: 60px; transition: border-color var(--transition); min-width: 0; }
.col-blk.drag-over { border-color: var(--accent); border-style: dashed; }
.col-hdr { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.col-cnt { background: var(--bg-hover); color: var(--text2); font-size: 11px; padding: 1px 8px; border-radius: 10px; font-weight: 700; }

/* media cards */
.mc { background: var(--bg-hover); border: 1.5px solid var(--border); border-radius: var(--radius-md); margin-bottom: 8px; cursor: grab; overflow: hidden; transition: all var(--transition); box-shadow: var(--shadow); }
.mc:hover { border-color: var(--border2); box-shadow: var(--shadow-lg); }
.mc:active { cursor: grabbing; }
.mc-img-wrap { width: 100%; height: 110px; overflow: hidden; background: var(--bg-card); }
.mc-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.mc-img { width: 100%; height: 110px; object-fit: cover; display: block; }
.mc-ph { width: 100%; height: 68px; display: flex; align-items: center; justify-content: center; font-size: 30px; background: var(--bg-card); }
.mc-body { padding: 10px; display: flex; flex-direction: column; gap: 5px; }
.mc-title { font-size: 13px; font-weight: 700; color: var(--text); }
.mc-actions { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.rev-ta { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 9px; color: var(--text); font-size: 12px; resize: vertical; }
.rev-ta:focus { outline: none; border-color: var(--accent); }

/* attachments — fixed thumbnail size */
.att-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.att-item { position: relative; background: var(--bg-hover); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 4px 7px; display: flex; align-items: center; gap: 5px; }
.att-img { width: 56px; height: 56px; object-fit: cover; border-radius: 6px; cursor: pointer; display: block; flex-shrink: 0; }
.att-file { font-size: 11px; color: var(--accent2); text-decoration: none; max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.att-del { background: none; border: none; color: var(--red); font-size: 11px; cursor: pointer; padding: 0 2px; }

/* meal plan — larger weekly grid */
.meal-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; width: 100%; min-width: 0; }
@media(max-width:700px){ .meal-grid { grid-template-columns: repeat(2,1fr); } }
@media(max-width:420px){ .meal-grid { grid-template-columns: 1fr; } }
.meal-day { background: var(--bg-card); border: 1.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 12px; }
.meal-today { border-color: var(--accent); background: #6366f108; }
.meal-dh { font-size: 13px; font-weight: 800; color: var(--text); text-align: center; margin-bottom: 10px; line-height: 1.4; }
.meal-slot { margin-bottom: 10px; border-radius: var(--radius-sm); transition: outline .12s, background .12s; }
.meal-slot.slot-drag-over { background: #6366f118; outline: 2px dashed var(--accent); outline-offset: 2px; border-radius: 6px; }
.meal-slot-l { font-size: 9px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
.meal-inp { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 5px; padding: 5px 7px; color: var(--text); font-size: 13px; outline: none; }
.meal-inp:focus { border-color: var(--accent); }
.meal-inp-kcal { color: #f97316; font-size: 11px; }
.meal-weight-row { display: flex; gap: 4px; align-items: center; margin-top: 2px; }
.meal-inp-weight { flex: 1; background: var(--bg-input); border: 1px solid var(--border); border-radius: 5px; padding: 4px 6px; color: #60a5fa; font-size: 11px; outline: none; width: 50px; }
.meal-inp-weight:focus { border-color: var(--accent); }
.meal-kcal-calc { font-size: 10px; color: #f97316; font-weight: 700; white-space: nowrap; padding: 3px 6px; background: #f9731611; border-radius: 4px; }

/* recipes — draggable */
.rec-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(180px,1fr)); gap: 10px; }
.rec-card { background: var(--bg-card); border: 1.5px solid var(--border); border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow); cursor: grab; transition: all var(--transition); }
.rec-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.rec-card:active { cursor: grabbing; transform: scale(.97); }
.rec-img-wrap { height: 90px; background: var(--bg-hover); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.rec-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.rec-ph { font-size: 32px; }
.rec-body { padding: 9px; }
.rec-title { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 4px; word-break: break-word; }
.rec-link { font-size: 11px; color: var(--accent2); text-decoration: none; display: block; margin-bottom: 4px; }

// ── CALORIE SEARCH via Open Food Facts (free, no key) ────────────────────
window.searchKcal=async(inputId, resultId)=>{
  const q=v(inputId); if(!q) return;
  const el=document.getElementById(resultId);
  if(el){ el.textContent="Ищу…"; el.style.color="var(--text2)"; }

  try{
    // 1. Open Food Facts — бесплатная база ~3 млн продуктов
    const url=`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&search_simple=1&action=process&json=1&page_size=5&fields=product_name,nutriments`;
    const resp=await fetch(url);
    if(!resp.ok) throw new Error("network");
    const data=await resp.json();
    const products=(data.products||[]).filter(p=>p.nutriments?.["energy-kcal_100g"]);

    if(products.length>0){
      const p=products[0];
      const kcal=Math.round(p.nutriments["energy-kcal_100g"]);
      const name=p.product_name||q;
      if(el){
        el.textContent=`✅ ${name}: ≈ ${kcal} ккал / 100г`;
        el.style.color="var(--green)";
      }
      // автозаполнение поля ккал
      const kcalInp=document.getElementById(inputId.replace("rec-name","rec-kcal"));
      if(kcalInp) kcalInp.value=kcal;
      return;
    }

    // 2. USDA FoodData Central (fallback, тоже бесплатный)
    const usdaKey="DEMO_KEY"; // demo лимит 30 запросов/час
    const u2=`https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(q)}&pageSize=3&api_key=${usdaKey}`;
    const r2=await fetch(u2);
    if(r2.ok){
      const d2=await r2.json();
      const food=(d2.foods||[]).find(f=>(f.foodNutrients||[]).some(n=>n.nutrientName==="Energy"&&n.unitName==="KCAL"));
      if(food){
        const nut=food.foodNutrients.find(n=>n.nutrientName==="Energy"&&n.unitName==="KCAL");
        const kcal=Math.round(nut.value);
        if(el){
          el.textContent=`✅ ${food.description}: ≈ ${kcal} ккал / 100г`;
          el.style.color="var(--green)";
        }
        const kcalInp=document.getElementById(inputId.replace("rec-name","rec-kcal"));
        if(kcalInp) kcalInp.value=kcal;
        return;
      }
    }

    // ничего не нашли
    if(el){
      el.textContent="Не найдено — введите калории вручную";
      el.style.color="var(--yellow)";
    }
  }catch(e){
    if(el){
      el.textContent="Ошибка сети — введите калории вручную";
      el.style.color="var(--red)";
    }
  }
};

window.setMeal=(ds,slot)=>{
  const key=ds+"__"+slot,el=document.getElementById("meal-"+key);
  const kel=document.getElementById("kcal-"+key);
  const wel=document.getElementById("weight-"+key);
  if(!el)return;
  const val=el.value.trim(), weight=parseInt(wel?.value)||0;
  let kcal=parseInt(kel?.value)||0;
  // if weight given and we have kcal per grams from recipe, recalculate
  if(weight>0&&kcal===0){
    // try to find matched recipe
    const rec=Object.values(recipes).find(r=>r.name===val);
    if(rec&&rec.kcal){
      const per=rec.kcalGrams||100;
      kcal=Math.round(rec.kcal*weight/per);
      if(kel)kel.value=kcal;
    }
  }
  val?set(ref(db,"mealPlan/"+key),{meal:val,date:ds,slot,kcal,weight}):remove(ref(db,"mealPlan/"+key));
};

// recalc kcal when weight changes
window.onWeightChange=(ds,slot)=>{
  const key=ds+"__"+slot;
  const nameEl=document.getElementById("meal-"+key);
  const kcalEl=document.getElementById("kcal-"+key);
  const weightEl=document.getElementById("weight-"+key);
  const calcEl=document.getElementById("calc-"+key);
  if(!nameEl||!weightEl)return;
  const val=nameEl.value.trim();
  const weight=parseInt(weightEl.value)||0;
  const rec=Object.values(recipes).find(r=>r.name===val);
  if(rec&&rec.kcal&&weight>0){
    const per=rec.kcalGrams||100;
    const calc=Math.round(rec.kcal*weight/per);
    if(kcalEl)kcalEl.value=calc;
    if(calcEl){calcEl.textContent="🔥 "+calc+" ккал";calcEl.style.display="block";}
  } else {
    if(calcEl)calcEl.style.display="none";
  }
};

function rGrocery(){
  const safe=safeCats(gcats,DEFAULT_GCATS);
  let items=sorted(groceries);
  if(gFCat!=="all")items=items.filter(([,g])=>g.cat===gFCat);
  if(gFDate==="today")items=items.filter(([,g])=>g.day===TODAY);
  if(gFDate==="week"){const e=new Date(NOW);e.setDate(NOW.getDate()+6);items=items.filter(([,g])=>g.day>=TODAY&&g.day<=fmt(e));}
  if(gFDate==="custom"&&gFDateVal)items=items.filter(([,g])=>g.day===gFDateVal);
  const dC=Object.values(groceries).filter(g=>g.done).length,tot=Object.keys(groceries).length;
  const pct=tot?Math.round(dC/tot*100):0;
  const grouped=safe.reduce((a,cat)=>{const its=items.filter(([,g])=>g.cat===cat.id);if(its.length)a.push({cat,items:its});return a;},[]);
  const ung=items.filter(([,g])=>!safe.find(c=>c.id===g.cat));
  if(ung.length)grouped.push({cat:{id:"?",e:"❓",l:"Без категории",c:"#8b92b8"},items:ung});
  return`

    <div class="s-heading"><div class="s-title">🛒 Продукты</div>${catMgrBtn("grocery")}</div>

      </div>
    </div>

      </div>

    <div class="section" style="gap:10px">

      <div>

        <div class="section" style="gap:6px">
        ${items.map(([id,g])=>`
          <div class="item${g.done?" done":""}" style="border-left:3px solid ${cat.c}"
            draggable="true" ondragstart="listDragStart(event,'${id}','grocery')" ondragend="listDragEnd(event)"

}

}

function rMeal(){
  const weekDates=getMealWeek();
  const fridgeItems=sorted(fridge),recipeItems=sorted(recipes);
  const weekLabel=()=>{if(mealWeekOff===0)return"Текущая неделя";if(mealWeekOff===1)return"Следующая неделя";if(mealWeekOff===-1)return"Прошлая неделя";return weekDates[0].toLocaleDateString("ru-RU",{day:"numeric",month:"short"})+" – "+weekDates[6].toLocaleDateString("ru-RU",{day:"numeric",month:"short"});};

  // daily calorie totals
  const dayKcal={};
  weekDates.forEach(d=>{
    const ds=fmt(d);
    dayKcal[ds]=SLOTS.reduce((sum,slot)=>{
      const key=ds+"__"+slot;
      return sum+(mealPlan[key]?.kcal||0);
    },0);
  });

  return`
  <div class="section">
    <div class="s-title">🍽️ План питания</div>
    <div class="s-sub">❄️ Холодильник</div>
    <div class="card">
      <div class="fgrid">
        <input id="fr-name" class="inp fcol2" placeholder="Продукт…" onkeydown="if(event.key==='Enter')addFridge()"/>
        <input id="fr-qty" class="inp" placeholder="Кол-во"/>
        <input id="fr-exp" class="inp" type="date"/>
        <button class="btn fcol2" onclick="addFridge()">＋ Добавить</button>
      </div>
    </div>
    ${fridgeItems.length===0?`<div class="empty">Холодильник пуст 🥶</div>`:""}
    <div class="section" style="gap:6px">
    ${fridgeItems.map(([id,f])=>`
      <div class="item${f.done?" done":""}" style="border-left:3px solid #60a5fa"
        draggable="true" ondragstart="listDragStart(event,'${id}','fridge')" ondragend="listDragEnd(event)"
        ondragover="listDragOver(event,'${id}','fridge')" ondrop="listDrop(event,'${id}','fridge')">
        <div class="drag-handle">⠿</div>
        <input type="checkbox" class="chkbox" ${f.done?"checked":""} onchange="toggleFridge('${id}')"/>
        <div class="item-body">
          <div class="item-name"${f.done?` style="text-decoration:line-through"`:""}>${f.name}</div>
          ${f.qty||f.expires?`<div class="item-meta">${[f.qty,f.expires?"до "+f.expires.slice(5).replace("-","."):""].filter(Boolean).join(" · ")}</div>`:""}
        </div>
        <button class="del-btn" onclick="delFridge('${id}')">✕</button>
      </div>`).join("")}
    </div>

    <div class="s-sub">📖 Рецепты</div>
    <div class="card">
      <div class="fgrid">
        <div style="grid-column:1/-1;display:flex;gap:6px;align-items:center">
          <input id="rec-name" class="inp" placeholder="Название рецепта…" style="flex:1" onkeydown="if(event.key==='Enter')addRecipe()"/>
          <button class="btn-ghost" style="white-space:nowrap" onclick="searchKcal('rec-name','rec-kcal-result')">🔍 ккал</button>
        </div>
        <div id="rec-kcal-result" class="kcal-result" style="grid-column:1/-1"></div>
        <input id="rec-url"  class="inp" placeholder="Ссылка на рецепт"/>
        <div style="display:flex;gap:6px;align-items:center">
          <input id="rec-kcal" class="inp" type="number" placeholder="ккал" style="flex:1"/>
          <span style="font-size:12px;color:var(--text2);white-space:nowrap">на</span>
          <input id="rec-kcal-grams" class="inp" type="number" placeholder="100" value="100" style="width:65px"/>
          <span style="font-size:12px;color:var(--text2)">г</span>
        </div>
        <div style="grid-column:1/-1">
          <div class="filter-label" style="margin-bottom:4px">Текст рецепта</div>
          <textarea id="rec-instructions" class="inp" rows="4" placeholder="Ингредиенты, шаги приготовления…" style="resize:vertical;line-height:1.6"></textarea>
        </div>
        <button class="btn fcol2" onclick="addRecipe()">＋ Добавить рецепт</button>
      </div>
    </div>
    ${recipeItems.length===0?`<div class="empty">Рецептов нет 👨‍🍳<br/><span style="font-size:12px;color:var(--text3)">Добавьте рецепт и перетащите в меню</span></div>`:""}
    <div class="rec-grid">
      ${recipeItems.map(([id,r])=>`<div class="rec-card"
        draggable="true"
        ondragstart="recDragStart(event,'${id}')"
        ondragend="recDragEnd()"
        title="Перетащите в меню недели">
        <div class="rec-img-wrap"><span class="rec-ph">🍴</span></div>
        <div class="rec-body">
          <div class="rec-title">${r.name}</div>
          ${r.kcal?`<div class="kcal-badge" style="margin-bottom:4px">🔥 ${r.kcal} ккал / ${r.kcalGrams||100}г</div>`:""}
          ${r.instructions?`<div style="font-size:10px;color:var(--text2);margin-bottom:4px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${r.instructions.replace(/</g,"&lt;")}</div>`:""}
          ${r.url?`<a href="${r.url}" target="_blank" class="rec-link">🔗 Открыть</a>`:""}
          <div class="rec-drag-hint">⠿ Перетащи в меню</div>
          <div class="rec-actions">
            <button class="btn-xs" onclick="openRecipeEdit('${id}')">✏️ Ред.</button>
            <button class="del-btn" onclick="delRecipe('${id}')">✕</button>
          </div>
        </div>
      </div>`).join("")}
    </div>

    <div class="s-sub" style="justify-content:space-between">
      <span>📅 ${weekLabel()}</span>
      <span style="display:flex;gap:4px">
        <button class="cal-nav-btn" onclick="prevMealWeek()">‹</button>
        <button class="cal-nav-btn" onclick="nextMealWeek()">›</button>
      </span>
    </div>

    <div class="meal-grid">
      ${weekDates.map((d,di)=>{
        const ds=fmt(d),isT=ds===TODAY;
        const totalKcal=dayKcal[ds]||0;
        return`<div class="meal-day${isT?" meal-today":""}">
          <div class="meal-dh">${WFULL[di]}<br/><span style="font-size:10px;color:var(--text3)">${d.getDate()}.${String(d.getMonth()+1).padStart(2,"0")}</span></div>
          ${SLOTS.map(slot=>{
            const key=ds+"__"+slot,saved=mealPlan[key]?.meal||"",savedKcal=mealPlan[key]?.kcal||"",savedWeight=mealPlan[key]?.weight||"";
            return`<div class="meal-slot"
              ondragover="slotDragOver(event)"
              ondragleave="slotDragLeave(event)"
              ondrop="slotDrop(event,'${ds}','${slot}')">
              <div class="meal-slot-l">${slot}</div>
              <input class="meal-inp" value="${saved.replace(/"/g,"&quot;")}" placeholder="Блюдо…"
                onblur="setMeal('${ds}','${slot}')" onkeydown="if(event.key==='Enter'){setMeal('${ds}','${slot}');this.blur()}"
                id="meal-${key}"/>
              <div class="meal-weight-row">
                <input class="meal-inp-weight" type="number" value="${savedWeight}" placeholder="г"
                  title="Вес порции в граммах"
                  oninput="onWeightChange('${ds}','${slot}')"
                  onblur="setMeal('${ds}','${slot}')" id="weight-${key}"/>
                <span style="font-size:10px;color:var(--text3)">г</span>
                <input class="meal-inp meal-inp-kcal" type="number" value="${savedKcal}" placeholder="ккал"
                  onblur="setMeal('${ds}','${slot}')" id="kcal-${key}" style="flex:1"/>
              </div>
              <div id="calc-${key}" class="meal-kcal-calc" style="display:${savedWeight&&savedKcal?"block":"none"}">${savedWeight&&savedKcal?"🔥 "+savedKcal+" ккал":""}</div>
            </div>`;}).join("")}
          ${totalKcal>0?`<div class="meal-kcal" style="text-align:center;margin-top:6px;border-top:1px solid var(--border);padding-top:6px;font-size:12px;font-weight:700;color:#f97316">🔥 ${totalKcal} ккал / день</div>`:""}
        </div>`;}).join("")}
    </div>
  </div>`;
}

function getWorkoutWeek(){
  const d=new Date(NOW),dow=(d.getDay()+6)%7;
  d.setDate(d.getDate()-dow+workoutWeekOff*7);
  return Array.from({length:7},(_,i)=>{const dd=new Date(d);dd.setDate(d.getDate()+i);return dd;});
}

function rWorkout(){
  const weekDates=getWorkoutWeek();
  const weekLabel=()=>{
    if(workoutWeekOff===0)return"Текущая неделя";
    if(workoutWeekOff===1)return"Следующая неделя";
    if(workoutWeekOff===-1)return"Прошлая неделя";
    return weekDates[0].toLocaleDateString("ru-RU",{day:"numeric",month:"short"})+" – "+weekDates[6].toLocaleDateString("ru-RU",{day:"numeric",month:"short"});
  };

  function personWeek(person, emoji){
    const personKey=person==="Семён"?"semen":"adelya";
    // stats
    const totalDays=weekDates.length;
    const doneDays=weekDates.filter(d=>workoutDone[`${person}__${fmt(d)}`]).length;
    // all done days ever for this person
    const allDone=Object.keys(workoutDone).filter(k=>k.startsWith(person+"__")&&workoutDone[k]).length;

    return`<div class="workout-person">
      <div class="workout-person-hdr">${emoji} ${person}</div>
      <div class="workout-stats">
        <div class="workout-stat"><div class="workout-stat-val" style="color:#22c55e">${doneDays}</div><div class="workout-stat-lbl">На этой неделе</div></div>
        <div class="workout-stat"><div class="workout-stat-val" style="color:#6366f1">${allDone}</div><div class="workout-stat-lbl">Всего тренировок</div></div>
        <div class="workout-stat"><div class="workout-stat-val" style="color:#f59e0b">${Math.round(doneDays/totalDays*100)}%</div><div class="workout-stat-lbl">Выполнено</div></div>
      </div>
      ${weekDates.map((d,di)=>{
        const ds=fmt(d);
        const doneKey=`${person}__${ds}`;
        const isDone=!!workoutDone[doneKey];
        const isToday=ds===TODAY;
        const prefix=`${person}__${ds}__`;
        const exEntries=Object.entries(workouts).filter(([k])=>k.startsWith(prefix));
        return`<div class="workout-day${isToday?" is-today":""}${isDone?" is-done":""}">
          <div class="workout-day-hdr">
            <div class="workout-day-name">${WFULL[di]} <span style="font-size:10px;color:var(--text3)">${d.getDate()}.${String(d.getMonth()+1).padStart(2,"0")}</span></div>
            <button class="workout-done-btn${isDone?" done":""}" onclick="toggleWorkoutDone('${person}','${ds}')">
              ${isDone?"✓ Выполнено":"Отметить"}
            </button>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px">
            ${exEntries.map(([key,ex])=>`
              <div class="workout-ex-row">
                <input class="workout-ex-inp" id="wex-${key}-name" value="${(ex.name||"").replace(/"/g,"&quot;")}" placeholder="Упражнение"
                  onblur="saveExercise('${person}','${ds}','','0')" style="flex:2"/>
                <input class="workout-ex-inp" id="wex-${key}-sets" value="${ex.sets||""}" placeholder="Подх." type="number"
                  onblur="saveExercise('${person}','${ds}','','0')" style="width:44px;flex:none"/>
                <input class="workout-ex-inp" id="wex-${key}-reps" value="${ex.reps||""}" placeholder="Повт." type="number"
                  onblur="saveExercise('${person}','${ds}','','0')" style="width:44px;flex:none"/>
                <button class="del-btn" onclick="delExercise('${key}')">✕</button>
              </div>`).join("")}
            <button class="workout-add-ex" onclick="addExercise('${person}','${ds}','day')">＋ Упражнение</button>
          </div>
        </div>`;}).join("")}
    </div>`;
  }

  return`
  <div class="section">
    <div class="s-heading">
      <div class="s-title">💪 Тренировки</div>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="cal-nav-btn" onclick="prevWorkoutWeek()">‹</button>
        <span style="font-size:13px;font-weight:700;color:var(--text)">${weekLabel()}</span>
        <button class="cal-nav-btn" onclick="nextWorkoutWeek()">›</button>
      </div>
    </div>
    <div class="workout-grid">
      ${personWeek("Семён","👨")}
      ${personWeek("Аделя","👩")}
    </div>
  </div>`;
}

  {id:"tasks",    e:"✅",l:"Дела"},

      <!-- Mobile header -->

          ${currentUser?`<span class="user-pill-inline">👤 ${currentUser}</span>`:""}

      <!-- Desktop top bar -->

          <div class="date-chip">${NOW.toLocaleDateString("ru-RU",{weekday:"long",day:"numeric",month:"long"})}</div>

      ${TABS.map(t=>`<button class="bnav-btn${activeTab===t.id?" active":""}" onclick="setTab('${t.id}')">

  <!-- File input -->
